name: SundayPrep Automation

on:
  schedule:
    - cron: '0 15 * * 0' # 8:00 AM PST Sunday
  workflow_dispatch:

permissions:
  contents: read
  models: read  # Required for GitHub Models API access

jobs:
  run-automation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Execute SundayPrep
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # Built-in secret
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_PASS: ${{ secrets.GMAIL_APP_PASSWORD }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py